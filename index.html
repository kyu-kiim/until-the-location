<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>until-the-location</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #canvas { position: fixed; top: 0; left: 0; display: block; cursor: crosshair; }
    #panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 110px; background: #000;
      border-top: 1px solid #111; z-index: 100;
    }
    #panel-label {
      color: #222; font-size: 8px; letter-spacing: 3px;
      text-transform: uppercase; padding: 6px 12px 3px;
    }
    #cms-list {
      display: flex; gap: 6px; padding: 4px 12px 8px;
      overflow-x: auto; height: 80px; align-items: flex-start;
      scrollbar-width: thin; scrollbar-color: #222 #000;
    }
    .cms-item {
      color: #bbb; font-size: 9px; letter-spacing: 0.5px;
      padding: 5px 8px; border: 1px solid #1e1e1e;
      cursor: grab; white-space: nowrap; user-select: none;
      flex-shrink: 0; line-height: 1.4;
    }
    .cms-item:hover { border-color: #555; color: #fff; }
    .cms-item .role-tag {
      display: block; color: #333; font-size: 7px;
      margin-top: 2px; letter-spacing: 1px;
    }
    #drag-ghost {
      position: fixed; pointer-events: none;
      color: #fff; font-size: 9px; font-family: 'Courier New', monospace;
      padding: 3px 7px; border: 1px solid #444;
      background: #000; z-index: 9999; display: none; white-space: nowrap;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="panel">
  <div id="panel-label">drop to canvas — drag band to expand</div>
  <div id="cms-list"></div>
</div>
<div id="drag-ghost"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy4u5g38yzruaKY4dT3KzIps8zHhBbJ_TTwKqSWLeRvkSZRrhRsii6hTZtsfcnhl79gyxdAodJ1BxW/pub?gid=2084734993&single=true&output=csv';
const PANEL_H = 110;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const ghost = document.getElementById('drag-ghost');
let canvasRect = { left: 0, top: 0 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - PANEL_H;
  canvasRect = canvas.getBoundingClientRect();
}
window.addEventListener('resize', resize);
resize();

let cmsItems = [], bands = [], nextOrder = 0, dragState = null;

function h(n) { const x = Math.sin(n * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }
function h2(x, y) { return h(x * 127.1 + y * 311.7); }

const ROLE_KEYS = {
  'avg-error':  /average|error|reduc|smooth|noise|평균|오차/i,
  'reference':  /reference|anchor|creat|origin|기준|좌표|ref/i,
  'natural':    /natural|organic|wave|environ|자연|환경|파동/i,
  'artificial': /artific|digit|glitch|machine|mechan|인공|기술|방해/i,
  'conversion': /convers|data|transform|encod|변환|데이터/i,
};
const ROLE_LIST = Object.keys(ROLE_KEYS);

function detectRole(item, idx) {
  const src = `${item.form||''} ${item.type||''} ${item.role||''} ${item.name||''}`;
  for (const [role, re] of Object.entries(ROLE_KEYS)) if (re.test(src)) return role;
  return ROLE_LIST[idx % ROLE_LIST.length];
}

function S(alpha, w) {
  ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
  ctx.lineWidth = Math.max(0.2, w);
}

// ─── Pattern: avg-error ── noise → smooth left to right ──────────────────
function drawAvgError(b, t) {
  const { y, height: H, density, jitter, order } = b;
  const W = canvas.width;
  if (H < 2) { S(1, 1); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); return; }
  const count = Math.max(1, Math.round(H * density * 0.14 + 1));
  for (let i = 0; i < count; i++) {
    const ly = count === 1 ? y : y - H/2 + (i / (count-1)) * H;
    S(0.45 + h2(i, order) * 0.55, Math.max(0.3, H / count * 0.55));
    ctx.beginPath();
    for (let j = 0; j <= 400; j++) {
      const px = j / 400 * W;
      const prog = j / 400;
      const amp = jitter * H * 0.45 * Math.pow(1 - prog, 1.6);
      const ny = ly + (h2(i*100+j, Math.floor(t*6))*2-1)*amp + Math.sin(j*0.28+t*1.3+i*1.9)*amp*0.3;
      j === 0 ? ctx.moveTo(px, ny) : ctx.lineTo(px, ny);
    }
    ctx.stroke();
  }
}

// ─── Pattern: reference ── axis + tick grid ───────────────────────────────
function drawReference(b) {
  const { y, height: H, density } = b;
  const W = canvas.width;
  S(1, Math.max(0.6, H * 0.055));
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  if (H < 3) return;
  const gap = Math.max(6, 55 / density);
  for (let x = 0; x <= W; x += gap) {
    const major = Math.round(x / gap) % 5 === 0;
    const th = major ? H * 0.88 : H * 0.32;
    S(major ? 0.75 : 0.4, major ? 0.6 : 0.3);
    ctx.beginPath(); ctx.moveTo(x, y - th/2); ctx.lineTo(x, y + th/2); ctx.stroke();
  }
  if (H > 12) {
    const subs = Math.max(2, Math.round(density * 5));
    for (let i = 1; i < subs; i++) {
      S(0.12, 0.25);
      ctx.beginPath(); ctx.moveTo(0, y - H/2 + (i/subs)*H); ctx.lineTo(W, y - H/2 + (i/subs)*H); ctx.stroke();
    }
  }
  S(0.35, 0.5);
  ctx.beginPath(); ctx.moveTo(W/2, y - H/2); ctx.lineTo(W/2, y + H/2); ctx.stroke();
}

// ─── Pattern: natural ── smooth overlapping waves ─────────────────────────
function drawNatural(b, t) {
  const { y, height: H, density, jitter, order } = b;
  const W = canvas.width;
  if (H < 2) { S(1, 1); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); return; }
  const count = Math.max(1, Math.round(H * density * 0.11 + 1));
  for (let i = 0; i < count; i++) {
    const ly = count === 1 ? y : y - H/2 + (i / (count-1)) * H;
    const phase = (i/count)*Math.PI*2 + t*(0.14 + jitter*0.09);
    const freq = 0.0025 + (i%3)*0.0012;
    const amp = H * 0.42 * (0.5 + h2(i, order) * 0.5);
    S(0.32 + h2(i, order+1)*0.52, Math.max(0.3, H/count*0.4));
    ctx.beginPath();
    for (let j = 0; j <= 400; j++) {
      const px = j/400*W;
      const py = ly + amp*Math.sin(px*freq+phase) + Math.sin(j*0.013+phase*0.55)*amp*0.18;
      j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
}

// ─── Pattern: artificial ── broken angular segments ───────────────────────
function drawArtificial(b, t) {
  const { y, height: H, density, jitter, order } = b;
  const W = canvas.width;
  if (H < 2) { S(1, 1); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); return; }
  const count = Math.max(1, Math.round(H * density * 0.09 + 1));
  const clock = Math.floor(t * 2);
  for (let i = 0; i < count; i++) {
    const ly = count === 1 ? y : y - H/2 + (i/(count-1))*H;
    const segs = Math.max(40, Math.round(density * 80));
    const sw = W / segs;
    S(0.55 + h2(i, order)*0.4, Math.max(0.3, H/count*0.42));
    ctx.beginPath();
    let px = 0, py = ly;
    ctx.moveTo(px, py);
    for (let s = 0; s < segs; s++) {
      const seed = order*500 + i*100 + s + clock*29;
      const rnd = h2(seed, i);
      if (rnd < jitter*0.27) {
        ctx.stroke(); ctx.beginPath();
        py = ly + (h2(seed+1,i)-0.5)*H*0.72;
        ctx.moveTo(px+sw, py);
      } else if (rnd < 0.33) {
        const sy = (h2(seed+2,i)-0.5)*H*0.48;
        ctx.lineTo(px+sw*0.5,py); py+=sy;
        ctx.lineTo(px+sw*0.5,py); ctx.lineTo(px+sw,py);
      } else ctx.lineTo(px+sw, py);
      px += sw;
    }
    ctx.stroke();
  }
}

// ─── Pattern: conversion ── progressive structure change L→R ─────────────
function drawConversion(b) {
  const { y, height: H, density } = b;
  const W = canvas.width, s = W/4;
  S(1, Math.max(0.6, H*0.055));
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(s, y); ctx.stroke();
  if (H < 3) return;
  const steps = Math.max(6, Math.round(density*22));
  S(0.82, Math.max(0.3, H*0.028));
  ctx.beginPath();
  let px = s, py = y; ctx.moveTo(px, py);
  for (let i = 0; i < steps; i++) {
    const nx = px + s/steps, ny = y + (i%2===0?1:-1)*H*0.28;
    ctx.lineTo(px+s/steps*0.5,py); ctx.lineTo(px+s/steps*0.5,ny); ctx.lineTo(nx,ny);
    px = nx; py = ny;
  }
  ctx.stroke();
  const pn = Math.max(2, Math.round(Math.sqrt(H+1)*density*0.75));
  const sp = H/(pn+1);
  for (let i = 1; i <= pn; i++) {
    S(0.28+(i/pn)*0.52, Math.max(0.2, H/pn*0.28));
    ctx.beginPath(); ctx.moveTo(s*2, y-H/2+sp*i); ctx.lineTo(s*3, y-H/2+sp*i); ctx.stroke();
  }
  const gd = Math.max(6, Math.round(density*28)), gs = s/gd;
  S(0.55, Math.max(0.2, H*0.009));
  for (let i = 0; i <= gd; i++) {
    ctx.beginPath(); ctx.moveTo(s*3+i*gs, y-H/2); ctx.lineTo(s*3+i*gs, y+H/2); ctx.stroke();
  }
  const hl = Math.max(2, Math.round(H/5));
  for (let i = 0; i <= hl; i++) {
    ctx.beginPath(); ctx.moveTo(s*3, y-H/2+(i/hl)*H); ctx.lineTo(W, y-H/2+(i/hl)*H); ctx.stroke();
  }
  S(0.2, 0.35);
  [s, s*2, s*3].forEach(ox => {
    ctx.beginPath(); ctx.moveTo(ox, y-H/2-3); ctx.lineTo(ox, y+H/2+3); ctx.stroke();
  });
}

const DRAW = {
  'avg-error':  drawAvgError,
  'reference':  (b) => drawReference(b),
  'natural':    drawNatural,
  'artificial': drawArtificial,
  'conversion': (b) => drawConversion(b),
};

function render(ts) {
  const t = ts / 1000;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  bands.forEach(b => DRAW[b.role]?.(b, t));

  if (dragState?.type === 'new' && dragState.y >= 0 && dragState.y <= canvas.height) {
    S(0.3, 1);
    ctx.setLineDash([3, 7]);
    ctx.beginPath(); ctx.moveTo(0, dragState.y); ctx.lineTo(canvas.width, dragState.y); ctx.stroke();
    ctx.setLineDash([]);
  }
  if (dragState?.type === 'expand') {
    const { y, height: H } = dragState.band;
    S(0.1, 0.4);
    ctx.setLineDash([2, 5]);
    ctx.strokeRect(0, y - H/2, canvas.width, H);
    ctx.setLineDash([]);
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

function hitBand(my) {
  return bands.find(b => Math.abs(my - b.y) <= Math.max(5, b.height/2 + 4));
}

canvas.addEventListener('mousemove', e => {
  if (dragState) return;
  const my = e.clientY - canvasRect.top;
  canvas.style.cursor = hitBand(my) ? 'ns-resize' : 'crosshair';
});

document.getElementById('cms-list').addEventListener('mousedown', e => {
  const el = e.target.closest('.cms-item');
  if (!el) return;
  const idx = +el.dataset.idx;
  const item = cmsItems[idx];
  dragState = { type: 'new', cmsItem: item, y: e.clientY - canvasRect.top };
  ghost.textContent = item.name || 'item';
  ghost.style.display = 'block';
  ghost.style.left = (e.clientX + 14) + 'px';
  ghost.style.top = (e.clientY + 14) + 'px';
  e.preventDefault();
});

canvas.addEventListener('mousedown', e => {
  if (dragState) return;
  const my = e.clientY - canvasRect.top;
  const band = hitBand(my);
  if (!band) return;
  dragState = { type: 'expand', band };
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!dragState) return;
  if (dragState.type === 'new') {
    dragState.y = e.clientY - canvasRect.top;
    ghost.style.left = (e.clientX + 14) + 'px';
    ghost.style.top = (e.clientY + 14) + 'px';
  } else {
    const dy = Math.abs(e.clientY - canvasRect.top - dragState.band.y);
    dragState.band.height = Math.max(1, dy * 2);
  }
});

window.addEventListener('mouseup', e => {
  if (!dragState) return;
  if (dragState.type === 'new') {
    ghost.style.display = 'none';
    const y = e.clientY - canvasRect.top;
    if (y >= 0 && y <= canvas.height) {
      const item = dragState.cmsItem;
      bands.push({
        id: `b${Date.now()}`,
        title: item.name || item.text || 'item',
        role: item._role,
        y, height: 1,
        density: 0.4 + h2(nextOrder, 0) * 0.6,
        jitter: 0.25 + h2(nextOrder, 1) * 0.45,
        order: nextOrder++,
        createdAt: Date.now()
      });
    }
  }
  dragState = null;
});

function parseCsv(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = splitLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitLine(line);
    const item = {};
    headers.forEach((k, i) => { item[k.trim().toLowerCase()] = (vals[i]||'').trim(); });
    return item;
  }).filter(item => Object.values(item).some(v => v));
}

function splitLine(line) {
  const cells = []; let cur = '', q = false;
  for (const ch of line) {
    if (ch === '"') q = !q;
    else if (ch === ',' && !q) { cells.push(cur); cur = ''; }
    else cur += ch;
  }
  cells.push(cur);
  return cells;
}

function buildPanel(items) {
  const list = document.getElementById('cms-list');
  items.forEach((item, idx) => {
    item._role = detectRole(item, idx);
    const el = document.createElement('div');
    el.className = 'cms-item';
    el.dataset.idx = idx;
    el.innerHTML = `${(item.name||'item').slice(0,28)}<span class="role-tag">${item._role}</span>`;
    list.appendChild(el);
  });
}

fetch(CSV_URL)
  .then(r => r.text())
  .then(text => { cmsItems = parseCsv(text); buildPanel(cmsItems); })
  .catch(() => {});
</script>
</body>
</html>
