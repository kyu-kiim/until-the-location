<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>until-the-location</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #canvas { position: fixed; top: 0; left: 0; display: block; cursor: crosshair; }
    #panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 110px; background: #000;
      border-top: 1px solid #111; z-index: 100;
    }
    #panel-label {
      color: #222; font-size: 8px; letter-spacing: 3px;
      text-transform: uppercase; padding: 6px 12px 3px;
    }
    #cms-list { overflow: hidden; height: 80px; display: flex; align-items: flex-start; }
    #cms-track {
      display: inline-flex; gap: 6px; padding: 4px 12px 8px;
      animation: ticker 28s linear infinite;
      will-change: transform;
    }
    #cms-track.paused { animation-play-state: paused; }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .cms-item {
      color: #bbb; font-size: 9px; letter-spacing: 0.5px;
      padding: 5px 8px; border: 1px solid #1e1e1e;
      cursor: grab; white-space: nowrap; user-select: none;
      flex-shrink: 0; line-height: 1.4; display: inline-block;
    }
    .cms-item:hover { border-color: #555; color: #fff; }
    .cms-item .role-tag {
      display: block; color: #333; font-size: 7px;
      margin-top: 2px; letter-spacing: 1px;
    }
    #drag-ghost {
      position: fixed; pointer-events: none;
      color: #fff; font-size: 9px; font-family: 'Courier New', monospace;
      padding: 3px 7px; border: 1px solid #444;
      background: #000; z-index: 9999; display: none; white-space: nowrap;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="panel">
  <div id="panel-label">drag direction sets axis — drag band to expand</div>
  <div id="cms-list"><div id="cms-track"></div></div>
</div>
<div id="drag-ghost"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy4u5g38yzruaKY4dT3KzIps8zHhBbJ_TTwKqSWLeRvkSZRrhRsii6hTZtsfcnhl79gyxdAodJ1BxW/pub?gid=2084734993&single=true&output=csv';
const PANEL_H = 110;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const ghost = document.getElementById('drag-ghost');
let canvasRect = { left: 0, top: 0 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - PANEL_H;
  canvasRect = canvas.getBoundingClientRect();
}
window.addEventListener('resize', resize);
resize();

let cmsItems = [], bands = [], nextOrder = 0, dragState = null, lastDrop = null;

function h(n) { const x = Math.sin(n * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }
function h2(x, y) { return h(x * 127.1 + y * 311.7); }

const ROLE_KEYS = {
  'avg-error':  /average|error|reduc|smooth|noise|평균|오차/i,
  'reference':  /reference|anchor|creat|origin|기준|좌표|ref/i,
  'natural':    /natural|organic|wave|environ|자연|환경|파동/i,
  'artificial': /artific|digit|glitch|machine|mechan|인공|기술|방해/i,
  'conversion': /convers|data|transform|encod|변환|데이터/i,
};
const ROLE_LIST = Object.keys(ROLE_KEYS);

function detectRole(item, idx) {
  const src = `${item.form||''} ${item.type||''} ${item.role||''} ${item.name||''}`;
  for (const [role, re] of Object.entries(ROLE_KEYS)) if (re.test(src)) return role;
  return ROLE_LIST[idx % ROLE_LIST.length];
}

function S(alpha, w) {
  ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
  ctx.lineWidth = Math.max(0.2, w);
}

// ─── avg-error: parallel horizontal lines + vertical scan sweep ───────────
function drawAvgError(b, t, len) {
  const { y, height: H, density, order } = b;
  const W = len;
  if (H < 2) { S(1, 1); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); return; }
  const count = Math.max(2, Math.round(H * density * 0.14 + 2));
  for (let i = 0; i < count; i++) {
    const ly = y - H/2 + (i + 0.5) / count * H;
    S(0.12 + h2(i, order) * 0.52, i % 5 === 0 ? 0.8 : 0.3);
    ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(W, ly); ctx.stroke();
  }
  const scanX = (t * 55 + order * 71) % (W + 60) - 30;
  S(0.7, 0.8);
  ctx.beginPath(); ctx.moveTo(scanX, y - H/2); ctx.lineTo(scanX, y + H/2); ctx.stroke();
}

// ─── reference: axis + ruler tick marks, static ──────────────────────────
function drawReference(b, t, len) {
  const { y, height: H, density } = b;
  const W = len;
  S(1, Math.max(0.8, H * 0.06));
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  if (H < 4) return;
  const gap = Math.max(8, 60 / density);
  for (let x = 0; x <= W; x += gap) {
    const major = Math.round(x / gap) % 5 === 0;
    S(major ? 0.85 : 0.4, major ? 0.7 : 0.3);
    const th = major ? H * 0.9 : H * 0.35;
    ctx.beginPath(); ctx.moveTo(x, y - th/2); ctx.lineTo(x, y + th/2); ctx.stroke();
  }
  if (H > 14) {
    const subs = Math.max(2, Math.round(density * 4));
    for (let i = 1; i < subs; i++) {
      S(0.1, 0.25);
      const sy = y - H/2 + (i / subs) * H;
      ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
    }
  }
}

// ─── natural: diagonal lines at fixed angle, slow linear drift ───────────
const DIAG_ANGLES = [30, 45, 60, -30, -45];
function drawNatural(b, t, len) {
  const { y, height: H, density, order } = b;
  const W = len;
  if (H < 2) { S(1, 1); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); return; }
  const rad = DIAG_ANGLES[order % DIAG_ANGLES.length] * Math.PI / 180;
  const tan = Math.tan(rad);
  const spacing = Math.max(6, 28 / density) / Math.max(0.4, Math.abs(Math.sin(rad)));
  const drift = (t * 12) % spacing;
  const dxPerH = H / tan;
  const startX = (tan > 0 ? -Math.abs(dxPerH) : 0) - spacing;
  const endX = W + Math.abs(dxPerH) + spacing;
  ctx.save();
  ctx.beginPath(); ctx.rect(0, y - H/2, W, H); ctx.clip();
  S(0.75, 0.5);
  ctx.beginPath();
  for (let bx = startX + drift; bx < endX; bx += spacing) {
    ctx.moveTo(bx, y + H/2);
    ctx.lineTo(bx + dxPerH, y - H/2);
  }
  ctx.stroke();
  ctx.restore();
}

// ─── artificial: vertical barcode columns + scan head ────────────────────
function drawArtificial(b, t, len) {
  const { y, height: H, density, order } = b;
  const W = len;
  if (H < 2) { S(1, 1); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); return; }
  const scanX = (t * 45 + order * 67) % W;
  const cols = Math.max(20, Math.round(W * density * 0.07));
  const step = W / cols;
  for (let i = 0; i < cols; i++) {
    const x = i * step + step / 2;
    if (h2(i, order) < 0.28) continue;
    const dist = Math.abs(x - scanX);
    const glow = Math.max(0, 1 - dist / (W * 0.12));
    const alpha = Math.max(0.1 + h2(i, order) * 0.38, glow * 0.95);
    const lh = H * (0.3 + h2(i + 200, order) * 0.7);
    S(alpha, Math.max(0.3, step * 0.45));
    ctx.beginPath(); ctx.moveTo(x, y - lh/2); ctx.lineTo(x, y + lh/2); ctx.stroke();
  }
}

// ─── conversion: flat → staircase → parallel → grid ──────────────────────
function drawConversion(b, t, len) {
  const { y, height: H, density } = b;
  const W = len, s = W / 4;
  S(1, Math.max(0.8, H * 0.055));
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(s, y); ctx.stroke();
  if (H < 3) return;
  const steps = Math.max(4, Math.round(density * 16));
  const sw = s / steps;
  S(0.85, Math.max(0.35, H * 0.028));
  ctx.beginPath();
  let px = s, py = y;
  ctx.moveTo(px, py);
  for (let i = 0; i < steps; i++) {
    const ny = y + (i % 2 === 0 ? 1 : -1) * H * 0.3;
    ctx.lineTo(px + sw, py);
    ctx.lineTo(px + sw, ny);
    px += sw; py = ny;
  }
  ctx.stroke();
  const pn = Math.max(2, Math.round(Math.sqrt(H + 1) * density * 0.7));
  for (let i = 0; i < pn; i++) {
    S(0.25 + (i / pn) * 0.55, Math.max(0.2, H / pn * 0.32));
    const ly = y - H/2 + (i + 0.5) / pn * H;
    ctx.beginPath(); ctx.moveTo(s*2, ly); ctx.lineTo(s*3, ly); ctx.stroke();
  }
  const gd = Math.max(4, Math.round(density * 18));
  S(0.45, 0.3);
  for (let i = 0; i <= gd; i++) {
    ctx.beginPath(); ctx.moveTo(s*3 + i*(s/gd), y - H/2); ctx.lineTo(s*3 + i*(s/gd), y + H/2); ctx.stroke();
  }
  const hl = Math.max(2, Math.round(H / 8));
  for (let i = 0; i <= hl; i++) {
    ctx.beginPath(); ctx.moveTo(s*3, y - H/2 + (i/hl)*H); ctx.lineTo(W, y - H/2 + (i/hl)*H); ctx.stroke();
  }
  S(0.2, 0.35);
  [s, s*2, s*3].forEach(ox => {
    ctx.beginPath(); ctx.moveTo(ox, y - H/2 - 2); ctx.lineTo(ox, y + H/2 + 2); ctx.stroke();
  });
}

const DRAW = {
  'avg-error':  drawAvgError,
  'reference':  drawReference,
  'natural':    drawNatural,
  'artificial': drawArtificial,
  'conversion': drawConversion,
};

// Vertical bands: rotate so all draw functions work unchanged.
// After translate(pos,0) + rotate(π/2): local(lx,ly) → screen(pos−ly, lx)
function renderBand(b, t) {
  if (b.axis === 'v') {
    ctx.save();
    ctx.translate(b.pos, 0);
    ctx.rotate(Math.PI / 2);
    DRAW[b.role]?.({ ...b, y: 0 }, t, canvas.height);
    ctx.restore();
  } else {
    DRAW[b.role]?.(b, t, canvas.width);
  }
}

// Square dot (+ clearRect gap) at every h×v band intersection
function drawIntersections() {
  const hb = bands.filter(b => b.axis === 'h');
  const vb = bands.filter(b => b.axis === 'v');
  if (!hb.length || !vb.length) return;
  hb.forEach(h => vb.forEach(v => {
    const cx = v.pos, cy = h.pos;
    if (cx < 0 || cx > canvas.width || cy < 0 || cy > canvas.height) return;
    const sz = Math.max(3, Math.min(5, Math.sqrt(Math.min(h.height, v.height)) * 0.5 + 2.5));
    const r = Math.round, c = Math.ceil;
    ctx.clearRect(r(cx - sz/2) - 1, r(cy - sz/2) - 1, c(sz) + 2, c(sz) + 2);
    ctx.fillStyle = '#fff';
    ctx.fillRect(r(cx - sz/2), r(cy - sz/2), c(sz), c(sz));
  }));
}

function render(ts) {
  const t = ts / 1000;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  bands.forEach(b => renderBand(b, t));
  drawIntersections();

  if (dragState?.type === 'new' && dragState.axis) {
    S(0.3, 1);
    ctx.setLineDash([3, 7]);
    ctx.beginPath();
    if (dragState.axis === 'h') {
      ctx.moveTo(0, dragState.y); ctx.lineTo(canvas.width, dragState.y);
    } else {
      ctx.moveTo(dragState.x, 0); ctx.lineTo(dragState.x, canvas.height);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (dragState?.type === 'expand') {
    const b = dragState.band;
    S(0.1, 0.4);
    ctx.setLineDash([2, 5]);
    if (b.axis === 'h') ctx.strokeRect(0, b.pos - b.height/2, canvas.width, b.height);
    else ctx.strokeRect(b.pos - b.height/2, 0, b.height, canvas.height);
    ctx.setLineDash([]);
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

function hitBand(mx, my) {
  return bands.find(b => b.axis === 'h'
    ? Math.abs(my - b.pos) <= Math.max(5, b.height/2 + 4)
    : Math.abs(mx - b.pos) <= Math.max(5, b.height/2 + 4));
}

canvas.addEventListener('mousemove', e => {
  if (dragState) return;
  const mx = e.clientX - canvasRect.left, my = e.clientY - canvasRect.top;
  const band = hitBand(mx, my);
  canvas.style.cursor = band ? (band.axis === 'h' ? 'ns-resize' : 'ew-resize') : 'crosshair';
});

document.getElementById('cms-list').addEventListener('mousedown', e => {
  const el = e.target.closest('.cms-item');
  if (!el) return;
  const item = cmsItems[+el.dataset.idx % cmsItems.length];
  dragState = { type: 'new', cmsItem: item, startX: e.clientX, startY: e.clientY,
    x: e.clientX - canvasRect.left, y: e.clientY - canvasRect.top, axis: null };
  ghost.textContent = item.name || 'item';
  ghost.style.display = 'block';
  ghost.style.left = (e.clientX + 14) + 'px';
  ghost.style.top  = (e.clientY + 14) + 'px';
  e.preventDefault();
});

canvas.addEventListener('mousedown', e => {
  if (dragState) return;
  const mx = e.clientX - canvasRect.left, my = e.clientY - canvasRect.top;
  const band = hitBand(mx, my);
  if (!band) return;
  dragState = { type: 'expand', band };
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!dragState) return;
  if (dragState.type === 'new') {
    dragState.x = e.clientX - canvasRect.left;
    dragState.y = e.clientY - canvasRect.top;
    ghost.style.left = (e.clientX + 14) + 'px';
    ghost.style.top  = (e.clientY + 14) + 'px';
    if (!dragState.axis) {
      const dx = Math.abs(e.clientX - dragState.startX);
      const dy = Math.abs(e.clientY - dragState.startY);
      if (dx > 12 || dy > 12) dragState.axis = dx > dy ? 'v' : 'h';
    }
  } else {
    const b = dragState.band;
    if (b.axis === 'h') b.height = Math.max(1, Math.abs(e.clientY - canvasRect.top - b.pos) * 2);
    else b.height = Math.max(1, Math.abs(e.clientX - canvasRect.left - b.pos) * 2);
  }
});

window.addEventListener('mouseup', e => {
  if (!dragState) return;
  if (dragState.type === 'new') {
    ghost.style.display = 'none';
    const x = e.clientX - canvasRect.left;
    const y = e.clientY - canvasRect.top;
    const axis = dragState.axis || 'h';
    const pos = axis === 'h' ? y : x;
    const inCanvas = axis === 'h' ? (y >= 0 && y <= canvas.height) : (x >= 0 && x <= canvas.width);
    if (inCanvas) {
      const item = dragState.cmsItem;
      let pathPhase = 0, pathMod = 0.5;
      if (lastDrop) {
        const ddx = x - lastDrop.x, ddy = y - lastDrop.y;
        pathPhase = Math.atan2(ddy, ddx);
        pathMod = Math.min(1, Math.sqrt(ddx*ddx + ddy*ddy) / 300);
      }
      lastDrop = { x, y };
      bands.push({
        id: `b${Date.now()}`,
        title: item.name || item.text || 'item',
        role: item._role,
        axis, pos, y: pos,
        height: 1,
        density: 0.4 + h2(nextOrder, 0) * 0.6 * (0.5 + pathMod * 0.5),
        jitter: 0.25 + h2(nextOrder, 1) * 0.35 + Math.abs(Math.sin(pathPhase)) * 0.15,
        pathPhase,
        order: nextOrder++,
      });
    }
  }
  dragState = null;
});

function parseCsv(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = splitLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitLine(line);
    const item = {};
    headers.forEach((k, i) => { item[k.trim().toLowerCase()] = (vals[i]||'').trim(); });
    return item;
  }).filter(item => Object.values(item).some(v => v));
}

function splitLine(line) {
  const cells = []; let cur = '', q = false;
  for (const ch of line) {
    if (ch === '"') q = !q;
    else if (ch === ',' && !q) { cells.push(cur); cur = ''; }
    else cur += ch;
  }
  cells.push(cur);
  return cells;
}

function buildPanel(items) {
  const track = document.getElementById('cms-track');
  [0, 1].forEach(() => {
    items.forEach((item, idx) => {
      item._role = detectRole(item, idx);
      const el = document.createElement('div');
      el.className = 'cms-item';
      el.dataset.idx = idx;
      el.innerHTML = `${(item.name||'item').slice(0,28)}<span class="role-tag">${item._role}</span>`;
      track.appendChild(el);
    });
  });
  track.addEventListener('mouseenter', () => track.classList.add('paused'));
  track.addEventListener('mouseleave', () => track.classList.remove('paused'));
}

fetch(CSV_URL)
  .then(r => r.text())
  .then(text => { cmsItems = parseCsv(text); buildPanel(cmsItems); })
  .catch(() => {});
</script>
</body>
</html>
